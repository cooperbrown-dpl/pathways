<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>NFL Teams CRUD</title>
    <link rel="stylesheet" href="css/nfl.css" />
</head>
<body>
    <h1>NFL Teams CRUD</h1>
    <h3>Add</h3>
    <form action="javascript:void(0);" method="POST" onsubmit="addItem()">
        <input type="text" id="add-name" placeholder="New NFL team" required>
        <input type="text" id="add-wins" placeholder="# of wins" required>
        <input type="text" id="add-losses" placeholder="# losses" required>
        <input type="text" id="add-quarterback" placeholder="Current quarterback">
        <input type="submit" value="Add">
    </form>

    <div id="editForm">
        <h3>Edit</h3>
        <form action="javascript:void(0);" onsubmit="updateItem()">
            <input type="hidden" id="edit-id">
            <input type="text" id="edit-name">
            <input type="text" id="edit-wins">
            <input type="text" id="edit-losses">
            <input type="text" id="edit-quarterback">
            <input type="submit" value="Save">
            <a onclick="closeInput()" aria-label="Close">&#10006;</a>
        </form>
    </div>

    <p id="counter"></p>

    <table>
        <tr>
            <th>NFL Teams</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Quarterback</th>
            <th></th>
            <th></th>
        </tr>
        <tbody id="nflTeams"></tbody>
    </table>

    <script src="js/nfl.js" asp-append-version="true"></script>
    <script type="text/javascript">
        getItems();
    </script>
</body>
</html>
